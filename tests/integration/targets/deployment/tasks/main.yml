---
# Integration tests for stevefulme1.github.deployment
# Requires live API credentials. Marked unsupported for CI.
# To run locally: ansible-test integration deployment --allow-unsupported

- name: Create deployment (check mode)
  stevefulme1.github.deployment:
    api_url: "{{ api_url | default('https://api.github.com') }}"
    api_key: "{{ api_key }}"
    state: present
  check_mode: true
  register: create_check

- name: Assert create check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed

- name: Create deployment
  stevefulme1.github.deployment:
    api_url: "{{ api_url | default('https://api.github.com') }}"
    api_key: "{{ api_key }}"
    state: present
  register: create_result

- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed

- name: Create deployment again (idempotency)
  stevefulme1.github.deployment:
    api_url: "{{ api_url | default('https://api.github.com') }}"
    api_key: "{{ api_key }}"
    state: present
  register: idem_result

- name: Assert idempotency
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete deployment
  stevefulme1.github.deployment:
    api_url: "{{ api_url | default('https://api.github.com') }}"
    api_key: "{{ api_key }}"
    state: absent
  register: delete_result

- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete deployment again (idempotency)
  stevefulme1.github.deployment:
    api_url: "{{ api_url | default('https://api.github.com') }}"
    api_key: "{{ api_key }}"
    state: absent
  register: delete_idem

- name: Assert delete idempotency
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
